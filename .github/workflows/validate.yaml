name: CI
on:
  push:
    branches:
      - main
permissions:
  contents: write
  packages: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm Lint
        run: helm lint nginx-chart
      - name: Render DEV
        run: helm template nginx-dev nginx-chart -f environments/dev/values.yaml
      - name: Render PROD
        run: helm template nginx-prod nginx-chart -f environments/prod/values.yaml
  docker:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/gitops-lab:${{ github.sha }} \
            ./app
      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/gitops-lab:${{ github.sha }}
  update-values:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update image tag
        run: |
          sed -i "s/tag:.*/tag: ${GITHUB_SHA}/" environments/dev/values.yaml
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add environments/dev/values.yaml
          git diff --cached --quiet || git commit -m "chore: update image tag [skip ci]"
      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}