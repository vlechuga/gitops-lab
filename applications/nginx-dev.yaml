apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-dev
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/vlechuga/gitops-lab.git
    targetRevision: main
    path: nginx-chart
    helm:
      valueFiles:
        - ../environments/dev/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true